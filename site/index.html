<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CLOUD HUB</title>
  <link rel="alternate" hreflang="ja" href="cloud-hub.html">
  <link rel="alternate" hreflang="en" href="cloud-hub.en.html">
  <script>
    const requested = new URLSearchParams(location.search).get('lang');
    let stored = null;
    try { stored = localStorage.getItem('cloud-hub-language'); } catch (_) {}
    const language = requested === 'ja' || requested === 'en'
      ? requested
      : stored === 'ja' || stored === 'en'
        ? stored
        : (navigator.language || 'en').toLowerCase().startsWith('ja') ? 'ja' : 'en';
    location.replace(language === 'ja' ? 'cloud-hub.html' : 'cloud-hub.en.html');
  </script>
</head>
<body>
  <p><a href="cloud-hub.html" lang="ja">CLOUD HUBを日本語で開く</a> / <a href="cloud-hub.en.html" lang="en">Open CLOUD HUB in English</a></p>
</body>
</html>
